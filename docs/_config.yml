# GitHub Pages Configuration
title: HostKit
description: All-in-one hosting server management toolkit
baseurl: ""
url: "https://ecuware.github.io/hostkit"

# Theme (optional - GitHub Pages supports these)
# theme: jekyll-theme-minimal

# Plugins
plugins:
  - jekyll-relative-links

# Navigation
navigation:
  - title: Home
    url: /
  - title: Installation
    url: /installation
  - title: Usage
    url: /usage
  - title: Packages
    url: /packages
  - title: Configuration
    url: /configuration
  - title: Contributing
    url: /contributing
  - title: Changelog
    url: /CHANGELOG

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - Makefile
  - "*.go"
  - go.mod
  - go.sum

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Permalinks
permalink: pretty

# Default settings
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default