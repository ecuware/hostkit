id: php
category: webserver
name: "PHP"
description: "Popular general-purpose scripting language for web development"
icon: "🐘"

version:
  current: "8.3"
  source:
    type: "url_scrape"
    url: "https://www.php.net/releases/"
    regex: "PHP (\\d+\\.\\d+)"

requirements:
  install_size: "200MB"
  estimated_time: "1-2 minutes"
  os:
    ubuntu: ["20.04", "22.04", "24.04"]
    debian: ["11", "12"]

install:
  ubuntu:
    method: "apt"
    repositories:
      - name: "ondrej/php"
        url: "ppa:ondrej/php"
    packages:
      - php{{ .Version }}-fpm
      - php{{ .Version }}-cli
      - php{{ .Version }}-common
      - php{{ .Version }}-mysql
      - php{{ .Version }}-pgsql
      - php{{ .Version }}-curl
      - php{{ .Version }}-gd
      - php{{ .Version }}-mbstring
      - php{{ .Version }}-xml
      - php{{ .Version }}-zip
      - php{{ .Version }}-intl
      - php{{ .Version }}-bcmath
    post_install: |
      systemctl enable php{{ .Version }}-fpm
      systemctl start php{{ .Version }}-fpm

config:
  files:
    - path: "/etc/php/{{ .Version }}/fpm/php.ini"
      description: "PHP-FPM configuration"
    - path: "/etc/php/{{ .Version }}/fpm/pool.d/www.conf"
      description: "PHP-FPM pool configuration"

versions:
  available:
    - "5.6"
    - "7.0"
    - "7.1"
    - "7.2"
    - "7.3"
    - "7.4"
    - "8.0"
    - "8.1"
    - "8.2"
    - "8.3"

commands:
  restart: "systemctl restart php{{ .Version }}-fpm"
  status: "systemctl status php{{ .Version }}-fpm"

support:
  docs: "https://www.php.net/docs.php"